name: Weekly blog post

# Publishes a new post every Monday at 08:00 America/Denver.
# 14:00 UTC = 08:00 MST (winter), 07:00 MDT (summer).
# Requires a repo secret named ANTHROPIC_API_KEY.

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog-post.mjs

      - name: Commit and push
        run: |
          git config user.name "pantera-claw-bot"
          git config user.email "bot@panteraclaw.com"
          git add src/content/posts
          if git diff --cached --quiet; then
            echo "No new post generated."
            exit 0
          fi
          git commit -m "blog: weekly auto post"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 3
          done
          echo "Push failed after 5 attempts" && exit 1
